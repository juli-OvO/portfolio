<!-- index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Julianne Jin</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">
</head>

<body>
  <div id="intro" aria-hidden="true">
    <div class="intro-text">
      <h1 id="revealTitle" class="reveal-title" aria-label="Julianne Jin"></h1>
    </div>
  </div>
  <canvas id="bubbleWipe" aria-hidden="true"></canvas>
  <div id="main">
    <canvas id="boids" aria-hidden="true"></canvas>
    <div id="cursor" aria-hidden="true"></div>
    <canvas id="cursorTrail" aria-hidden="true"></canvas>
    <button class="mode-toggle" id="modeToggle" type="button" aria-pressed="false" aria-label="Day mode">
      <span class="mode-icon" aria-hidden="true"></span>
    </button>
    <header class="site-header" id="siteHeader">
      <h1 style="color:rgb(13, 27, 40)">JULIANNE JIN</h1>
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </header>

    <div class="stage" id="stage">
      <!-- LEFT: book set -->
      <aside class="shelf" aria-label="Sections">
        <div class="bookstack" id="bookstack">
          <button class="book" data-section="bio" aria-controls="panel" aria-expanded="false">
            <span class="spine-text">BIO</span>
          </button>

          <button class="book" data-section="works" aria-controls="panel" aria-expanded="false">
            <span class="spine-text">WORKS</span>
          </button>

          <button class="book" data-section="cv" aria-controls="panel" aria-expanded="false">
            <span class="spine-text">CV</span>
          </button>

        </div>
      </aside>

      <!-- RIGHT: preview + open panel -->
      <main class="panel" id="panel" aria-live="polite">
        <div class="panel-body">
          
        </div>

      
      </main>
    </div>
  </div>
  <div class="mobile-nav-backdrop" id="mobileNavBackdrop" aria-hidden="true"></div>

  <!-- Mobile notice overlay — visible only on phone-sized screens -->
  <div class="mobile-notice" id="mobileNotice" role="dialog" aria-modal="true" aria-label="Mobile notice">
    <div class="mobile-notice__box">
      <p class="mobile-notice__title">mobile view</p>
      <p class="mobile-notice__sub">coming soon</p>
      <button class="mobile-notice__dismiss" id="mobileNoticeDismiss" aria-label="Dismiss">continue anyway</button>
    </div>
  </div>

  <p class="site-credit">This website was concepted, designed, and coded by Julianne Jin.</p>
  <script src="js/boids.js"></script>
  <script src="js/intro.js"></script>
  <script src="js/script.js"></script>
  <script src="js/cursor.js"></script>
</body>
</html>
