<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Illustration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="illus-page">
  <a class="page-back" href="index.html" aria-label="Back to portfolio">
    <span class="page-back__arrow" aria-hidden="true"></span>
  </a>
  <div id="cursor" aria-hidden="true"></div>
  <canvas id="cursorTrail" aria-hidden="true"></canvas>

  <main class="illus-stage">
    <header class="illus-header">
      <h1>Illustration</h1>
    </header>

    <div class="illus-carousel-wrap">
      <button class="illus-arrow illus-arrow--prev" aria-label="Previous illustration">
        <svg width="18" height="30" viewBox="0 0 18 30" fill="none" aria-hidden="true">
          <polyline points="14,3 3,15 14,27" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="illus-scene">
        <div class="illus-track">
          <figure class="illus-card" data-index="0">
            <img src="images/illustration/1.png" alt="Illustration 1" />
          </figure>
          <figure class="illus-card" data-index="1">
            <img src="images/illustration/2.png" alt="Illustration 2" />
          </figure>
          <figure class="illus-card" data-index="2">
            <img src="images/illustration/3.png" alt="Illustration 3" />
          </figure>
          <figure class="illus-card" data-index="3">
            <img src="images/illustration/4.png" alt="Illustration 4" />
          </figure>
          <figure class="illus-card" data-index="4">
            <img src="images/illustration/5.png" alt="Illustration 5" />
          </figure>
          <figure class="illus-card" data-index="5">
            <img src="images/illustration/6.jpg" alt="Illustration 6" />
          </figure>
        </div>
      </div>

      <button class="illus-arrow illus-arrow--next" aria-label="Next illustration">
        <svg width="18" height="30" viewBox="0 0 18 30" fill="none" aria-hidden="true">
          <polyline points="4,3 15,15 4,27" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </main>

  <script src="cursor.js"></script>
  <script src="illustration.js"></script>
</body>
</html>
